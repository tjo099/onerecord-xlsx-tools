name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      - run: bun run audit || true  # vulnerabilities tracked, not blocking — sibling owns the xlsx exposure
      - run: bun run test
